<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>  
    
    <script>

        //Normal Fn with para
        function demo1(text){
            console.log("HEllo " + text)
        }
        demo1("Ranjan!");
        // WIthout Para
        function demo2(){
            console.log("Ranjan");
        }
        demo2();

        //Functoin with Default para
        function add(a , b=10){
            console.log("Addition of two no is: " + (a+b));
        }
        add(23,20);


        // Annoymous FUnction 
        let cal = function(){
            var num1 = 25;
            var num2 = 55;
            var res = num1 * num2;
            console.log("MUltiply of num1 and num2 is: " + res);
        }
        cal();  //cal is a funtion now


        // Arrow Function with myltiple line stetment
        let div = (x,y)=>{ 
            var num1 = x;
            num2 = y;
            var res = x/y;
            console.log("DIv is: "+res);
        }
        div(12,6);

        //Arrow fun with single line statement
        let msg =()=>console.log("Hello ABES");
        msg();


        // Callback Function: 
        function sub(callback){
            var num1 = 20;
            var num2 = 10;
            var res = num1 - num2;
            callback(res);
        }
        function displayRes(res){
            console.log("Result is: " + res);
        }
        sub(displayRes);

        //callback using setTimeout API
        function msg1(){
            console.log("Hello Friend");
        }
        setTimeout(msg1,2000);
        //2000 = 2 sec

    </script>
</body>
</html>
